<!DOCTYPE html>
<html lang="en" class="light">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Fraction Calculator — Add, Subtract, Multiply, Divide Fractions</title>
  <meta name="description" content="Free online fraction calculator. Add, subtract, multiply and divide fractions instantly. Shows full step-by-step working. Simplifies results automatically.">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #faf7f2;
      --surface: #ffffff;
      --surface2: #f2ede4;
      --border: #e0d8cc;
      --accent: #c0392b;
      --accent2: #e67e22;
      --text: #1c1a17;
      --muted: #9c8f80;
      --result-bg: #fff8f7;
      --step-bg: #fdf5f4;
      --divider: #c0392b;
    }

    html.dark {
      --bg: #111110;
      --surface: #1a1917;
      --surface2: #222120;
      --border: #2e2c28;
      --accent: #e05a4a;
      --accent2: #e6922a;
      --text: #f0ebe2;
      --muted: #6b6358;
      --result-bg: #1e1210;
      --step-bg: #1a1410;
      --divider: #e05a4a;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'IBM Plex Sans', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
      transition: background 0.3s, color 0.3s;
    }

    /* Subtle dot pattern */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(var(--border) 1px, transparent 1px);
      background-size: 28px 28px;
      pointer-events: none;
      z-index: 0;
      opacity: 0.5;
    }

    /* Theme toggle */
    .theme-toggle {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 200;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 8px 14px;
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 0.78rem;
      color: var(--muted);
      font-weight: 500;
      transition: all 0.2s;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    .theme-toggle:hover { border-color: var(--accent); color: var(--text); }

    .wrapper {
      position: relative;
      z-index: 1;
      max-width: 780px;
      margin: 0 auto;
      padding: 0 24px 80px;
    }

    header {
      padding: 60px 0 44px;
    }

    .logo {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.6rem, 7vw, 4.4rem);
      line-height: 1;
      color: var(--text);
      letter-spacing: -1.5px;
      margin-bottom: 10px;
    }

    .logo em {
      color: var(--accent);
      font-style: italic;
    }

    .tagline {
      font-size: 0.9rem;
      color: var(--muted);
      font-weight: 300;
    }

    /* Operation tabs */
    .ops {
      display: flex;
      gap: 8px;
      margin-bottom: 28px;
      flex-wrap: wrap;
    }

    .op-btn {
      padding: 10px 20px;
      border: 1.5px solid var(--border);
      border-radius: 999px;
      background: var(--surface);
      color: var(--muted);
      font-family: 'Playfair Display', serif;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .op-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    .op-btn:hover:not(.active) {
      border-color: var(--accent);
      color: var(--text);
    }

    /* Main calc card */
    .calc-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 36px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.06);
    }

    /* Fraction input layout */
    .fraction-row {
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 28px;
    }

    .fraction-input {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    .fraction-input input {
      width: 90px;
      text-align: center;
      background: var(--surface2);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 1.3rem;
      padding: 10px 8px;
      outline: none;
      transition: border-color 0.2s;
      -moz-appearance: textfield;
    }

    .fraction-input input::-webkit-outer-spin-button,
    .fraction-input input::-webkit-inner-spin-button { -webkit-appearance: none; }

    .fraction-input input:focus { border-color: var(--accent); }

    .fraction-line {
      width: 90px;
      height: 2.5px;
      background: var(--divider);
      margin: 6px 0;
      border-radius: 2px;
    }

    .fraction-label {
      font-size: 0.68rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      font-weight: 500;
      margin-top: 8px;
    }

    .operator-symbol {
      font-family: 'Playfair Display', serif;
      font-size: 2.2rem;
      color: var(--accent);
      font-weight: 700;
      flex-shrink: 0;
      line-height: 1;
      margin-top: -8px;
    }

    .equals-symbol {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      color: var(--muted);
      flex-shrink: 0;
      margin-top: -8px;
    }

    /* Result fraction display */
    .result-fraction {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .result-num, .result-den {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 1.8rem;
      color: var(--accent);
      font-weight: 500;
      line-height: 1.1;
      min-width: 60px;
      text-align: center;
    }

    .result-line {
      width: 100%;
      min-width: 60px;
      height: 3px;
      background: var(--accent);
      margin: 5px 0;
      border-radius: 2px;
    }

    .result-whole {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 2.2rem;
      color: var(--accent);
      font-weight: 500;
    }

    .result-decimal {
      font-size: 0.78rem;
      color: var(--muted);
      margin-top: 10px;
      font-family: 'IBM Plex Mono', monospace;
    }

    .result-empty {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 1.6rem;
      color: var(--border);
    }

    /* Steps */
    .steps-section {
      margin-top: 28px;
      border-top: 1px solid var(--border);
      padding-top: 24px;
    }

    .steps-title {
      font-family: 'Playfair Display', serif;
      font-size: 1rem;
      color: var(--muted);
      margin-bottom: 16px;
      font-style: italic;
    }

    .step {
      background: var(--step-bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 18px;
      margin-bottom: 8px;
      display: flex;
      gap: 14px;
      align-items: flex-start;
      animation: fadeUp 0.3s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .step-num {
      background: var(--accent);
      color: white;
      border-radius: 999px;
      width: 22px;
      height: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.7rem;
      font-weight: 700;
      flex-shrink: 0;
      margin-top: 1px;
    }

    .step-text {
      font-size: 0.875rem;
      color: var(--text);
      line-height: 1.6;
    }

    .step-text strong {
      font-family: 'IBM Plex Mono', monospace;
      color: var(--accent);
      font-weight: 500;
    }

    /* Simplify / convert section */
    .extra-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 28px 36px;
      margin-top: 20px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.04);
    }

    .extra-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.2rem;
      margin-bottom: 16px;
      color: var(--text);
    }

    /* Buttons */
    .btn-row {
      display: flex;
      gap: 10px;
      margin-top: 24px;
      flex-wrap: wrap;
    }

    .calc-btn {
      background: var(--accent);
      border: none;
      border-radius: 10px;
      color: white;
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 0.9rem;
      font-weight: 500;
      padding: 12px 28px;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.02em;
    }

    .calc-btn:hover { opacity: 0.88; transform: translateY(-1px); }

    .clear-btn {
      background: transparent;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      color: var(--muted);
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 0.9rem;
      padding: 12px 22px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .clear-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* Quick ref */
    .quick-ref {
      margin-top: 48px;
    }

    .quick-ref h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
      margin-bottom: 16px;
      color: var(--text);
    }

    .ref-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 10px;
    }

    .ref-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      transition: all 0.2s;
    }

    .ref-card:hover { border-color: var(--accent); }

    .ref-card .ref-q {
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 6px;
      font-family: 'IBM Plex Mono', monospace;
    }

    .ref-card .ref-a {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 1rem;
      color: var(--accent2);
      font-weight: 500;
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--accent);
      color: white;
      padding: 10px 22px;
      border-radius: 999px;
      font-size: 0.85rem;
      font-weight: 500;
      opacity: 0;
      transition: all 0.3s;
      pointer-events: none;
      z-index: 100;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* Error */
    .error-msg {
      color: #e74c3c;
      font-size: 0.82rem;
      margin-top: 8px;
      min-height: 18px;
      font-style: italic;
    }

    footer {
      margin-top: 64px;
      padding-top: 24px;
      border-top: 1px solid var(--border);
    }

    footer p { font-size: 0.78rem; color: var(--muted); }

    @media (max-width: 560px) {
      .calc-card { padding: 20px; }
      .fraction-input input { width: 72px; font-size: 1.1rem; }
      .fraction-line { width: 72px; }
    }
  </style>
</head>
<body>

<button class="theme-toggle" onclick="toggleTheme()" id="theme-btn">
  <span id="theme-icon">🌙</span>
  <span id="theme-label">Dark</span>
</button>

<div class="wrapper">
  <header>
    <div class="logo">Fraction <em>Calculator</em></div>
    <p class="tagline">Add, subtract, multiply & divide fractions — with step-by-step working.</p>
  </header>

  <!-- Operation selector -->
  <div class="ops">
    <button class="op-btn active" onclick="setOp('add', this)">+ Add</button>
    <button class="op-btn" onclick="setOp('sub', this)">− Subtract</button>
    <button class="op-btn" onclick="setOp('mul', this)">× Multiply</button>
    <button class="op-btn" onclick="setOp('div', this)">÷ Divide</button>
  </div>

  <!-- Main calculator -->
  <div class="calc-card">
    <div class="fraction-row">
      <!-- Fraction A -->
      <div class="fraction-input">
        <input type="number" id="a-num" placeholder="1" oninput="calculate()">
        <div class="fraction-line"></div>
        <input type="number" id="a-den" placeholder="2" oninput="calculate()">
        <div class="fraction-label">1st fraction</div>
      </div>

      <!-- Operator -->
      <div class="operator-symbol" id="op-symbol">+</div>

      <!-- Fraction B -->
      <div class="fraction-input">
        <input type="number" id="b-num" placeholder="1" oninput="calculate()">
        <div class="fraction-line"></div>
        <input type="number" id="b-den" placeholder="3" oninput="calculate()">
        <div class="fraction-label">2nd fraction</div>
      </div>

      <!-- Equals -->
      <div class="equals-symbol">=</div>

      <!-- Result -->
      <div id="result-display">
        <div class="result-empty">?</div>
      </div>
    </div>

    <div class="error-msg" id="error-msg"></div>

    <div class="btn-row">
      <button class="clear-btn" onclick="clearAll()">Clear</button>
    </div>

    <!-- Steps -->
    <div class="steps-section" id="steps-section" style="display:none">
      <div class="steps-title">Step-by-step working</div>
      <div id="steps-container"></div>
    </div>
  </div>

  <!-- Simplify a single fraction -->
  <div class="extra-card">
    <div class="extra-title">Simplify a Fraction</div>
    <div class="fraction-row" style="margin-bottom:0">
      <div class="fraction-input">
        <input type="number" id="s-num" placeholder="6" oninput="simplifyLive()">
        <div class="fraction-line"></div>
        <input type="number" id="s-den" placeholder="9" oninput="simplifyLive()">
        <div class="fraction-label">Enter fraction</div>
      </div>
      <div class="equals-symbol">=</div>
      <div id="simplify-result"><div class="result-empty">?</div></div>
    </div>
  </div>

  <!-- Quick reference -->
  <div class="quick-ref">
    <h2>Common Fraction Results</h2>
    <div class="ref-grid" id="ref-grid"></div>
  </div>

  <footer>
    <p>Results and steps update instantly as you type.</p>
  </footer>
</div>

<div class="toast" id="toast">Copied!</div>

<script>
  // Theme
  const savedTheme = localStorage.getItem('frac-theme') || 'light';
  if (savedTheme === 'dark') applyDark();

  function applyLight() {
    document.documentElement.classList.add('light');
    document.documentElement.classList.remove('dark');
    document.getElementById('theme-label').textContent = 'Dark';
    document.getElementById('theme-icon').textContent = '🌙';
  }
  function applyDark() {
    document.documentElement.classList.remove('light');
    document.documentElement.classList.add('dark');
    document.getElementById('theme-label').textContent = 'Light';
    document.getElementById('theme-icon').textContent = '☀️';
  }
  function toggleTheme() {
    if (document.documentElement.classList.contains('dark')) {
      applyLight(); localStorage.setItem('frac-theme', 'light');
    } else {
      applyDark(); localStorage.setItem('frac-theme', 'dark');
    }
  }

  // State
  let currentOp = 'add';
  const opSymbols = { add: '+', sub: '−', mul: '×', div: '÷' };

  function setOp(op, btn) {
    currentOp = op;
    document.querySelectorAll('.op-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('op-symbol').textContent = opSymbols[op];
    calculate();
  }

  // Math helpers
  function gcd(a, b) {
    a = Math.abs(a); b = Math.abs(b);
    while (b) { [a, b] = [b, a % b]; }
    return a;
  }

  function lcm(a, b) { return Math.abs(a * b) / gcd(a, b); }

  function simplify(n, d) {
    if (d === 0) return null;
    const g = gcd(Math.abs(n), Math.abs(d));
    let sn = n / g, sd = d / g;
    if (sd < 0) { sn = -sn; sd = -sd; }
    return { n: sn, d: sd };
  }

  function getVal(id) {
    const v = parseInt(document.getElementById(id).value);
    return isNaN(v) ? null : v;
  }

  // Render a fraction in result area
  function renderFraction(n, d, containerId) {
    const el = document.getElementById(containerId);
    if (n === null) { el.innerHTML = '<div class="result-empty">?</div>'; return; }

    const decimal = (n / d).toFixed(4).replace(/\.?0+$/, '');

    if (d === 1) {
      el.innerHTML = `<div class="result-whole">${n}</div><div class="result-decimal">= ${decimal}</div>`;
    } else {
      // Check for mixed number
      const whole = Math.trunc(n / d);
      const remN = n - whole * d;
      let mixedHtml = '';
      if (Math.abs(whole) >= 1 && remN !== 0) {
        mixedHtml = `<div style="font-size:0.75rem;color:var(--muted);margin-top:8px;font-family:'IBM Plex Mono',monospace">= ${whole} and ${Math.abs(remN)}/${d}</div>`;
      }
      el.innerHTML = `
        <div class="result-fraction">
          <div class="result-num">${n}</div>
          <div class="result-line"></div>
          <div class="result-den">${d}</div>
          <div class="result-decimal">= ${decimal}</div>
          ${mixedHtml}
        </div>`;
    }
  }

  // Steps generator
  function buildSteps(an, ad, bn, bd, op) {
    const steps = [];
    let rn, rd;

    if (op === 'mul') {
      steps.push(`Multiply the numerators: <strong>${an} × ${bn} = ${an * bn}</strong>`);
      steps.push(`Multiply the denominators: <strong>${ad} × ${bd} = ${ad * bd}</strong>`);
      const raw = simplify(an * bn, ad * bd);
      rn = raw.n; rd = raw.d;
      if (an * bn !== rn || ad * bd !== rd) {
        const g = gcd(Math.abs(an * bn), Math.abs(ad * bd));
        steps.push(`Simplify by dividing both by their GCD (<strong>${g}</strong>): <strong>${rn}/${rd}</strong>`);
      }
    } else if (op === 'div') {
      steps.push(`To divide, multiply by the reciprocal of the 2nd fraction.`);
      steps.push(`Flip the 2nd fraction: <strong>${bd}/${bn}</strong>`);
      steps.push(`Now multiply: <strong>${an}/${ad} × ${bd}/${bn}</strong>`);
      steps.push(`Multiply numerators: <strong>${an} × ${bd} = ${an * bd}</strong>`);
      steps.push(`Multiply denominators: <strong>${ad} × ${bn} = ${ad * bn}</strong>`);
      const raw = simplify(an * bd, ad * bn);
      rn = raw.n; rd = raw.d;
      if (an * bd !== rn || ad * bn !== rd) {
        const g = gcd(Math.abs(an * bd), Math.abs(ad * bn));
        steps.push(`Simplify by dividing both by their GCD (<strong>${g}</strong>): <strong>${rn}/${rd}</strong>`);
      }
    } else {
      // add or sub
      if (ad === bd) {
        steps.push(`Denominators are already equal (<strong>${ad}</strong>), so keep it.`);
        const num = op === 'add' ? an + bn : an - bn;
        steps.push(op === 'add'
          ? `Add the numerators: <strong>${an} + ${bn} = ${num}</strong>`
          : `Subtract the numerators: <strong>${an} − ${bn} = ${num}</strong>`);
        const raw = simplify(num, ad);
        rn = raw.n; rd = raw.d;
        if (num !== rn || ad !== rd) {
          const g = gcd(Math.abs(num), Math.abs(ad));
          steps.push(`Simplify by dividing both by their GCD (<strong>${g}</strong>): <strong>${rn}/${rd}</strong>`);
        }
      } else {
        const l = lcm(ad, bd);
        steps.push(`Find the Least Common Denominator (LCD) of <strong>${ad}</strong> and <strong>${bd}</strong>: LCD = <strong>${l}</strong>`);
        const newAN = an * (l / ad);
        const newBN = bn * (l / bd);
        steps.push(`Convert 1st fraction: <strong>${an}/${ad} → ${newAN}/${l}</strong>`);
        steps.push(`Convert 2nd fraction: <strong>${bn}/${bd} → ${newBN}/${l}</strong>`);
        const num = op === 'add' ? newAN + newBN : newAN - newBN;
        steps.push(op === 'add'
          ? `Add the numerators: <strong>${newAN} + ${newBN} = ${num}</strong>`
          : `Subtract the numerators: <strong>${newAN} − ${newBN} = ${num}</strong>`);
        const raw = simplify(num, l);
        rn = raw.n; rd = raw.d;
        if (num !== rn || l !== rd) {
          const g = gcd(Math.abs(num), Math.abs(l));
          steps.push(`Simplify by dividing both by their GCD (<strong>${g}</strong>): <strong>${rn}/${rd}</strong>`);
        }
      }
    }

    steps.push(`Final answer: <strong>${rn}/${rd}</strong> (= ${(rn/rd).toFixed(6).replace(/\.?0+$/, '')})`);
    return { steps, rn, rd };
  }

  // Main calculate
  function calculate() {
    const an = getVal('a-num'), ad = getVal('a-den');
    const bn = getVal('b-num'), bd = getVal('b-den');
    const errEl = document.getElementById('error-msg');
    errEl.textContent = '';

    if (an === null || ad === null || bn === null || bd === null) {
      renderFraction(null, null, 'result-display');
      document.getElementById('steps-section').style.display = 'none';
      return;
    }

    if (ad === 0 || bd === 0) {
      errEl.textContent = 'Denominator cannot be zero.';
      renderFraction(null, null, 'result-display');
      document.getElementById('steps-section').style.display = 'none';
      return;
    }

    if (currentOp === 'div' && bn === 0) {
      errEl.textContent = 'Cannot divide by zero.';
      renderFraction(null, null, 'result-display');
      document.getElementById('steps-section').style.display = 'none';
      return;
    }

    const { steps, rn, rd } = buildSteps(an, ad, bn, bd, currentOp);
    renderFraction(rn, rd, 'result-display');

    // Render steps
    const container = document.getElementById('steps-container');
    container.innerHTML = '';
    steps.forEach((s, i) => {
      const div = document.createElement('div');
      div.className = 'step';
      div.style.animationDelay = `${i * 0.05}s`;
      div.innerHTML = `<div class="step-num">${i + 1}</div><div class="step-text">${s}</div>`;
      container.appendChild(div);
    });
    document.getElementById('steps-section').style.display = 'block';
  }

  // Simplify live
  function simplifyLive() {
    const n = getVal('s-num'), d = getVal('s-den');
    if (n === null || d === null || d === 0) {
      document.getElementById('simplify-result').innerHTML = '<div class="result-empty">?</div>';
      return;
    }
    const s = simplify(n, d);
    renderFraction(s.n, s.d, 'simplify-result');
  }

  // Clear
  function clearAll() {
    ['a-num','a-den','b-num','b-den'].forEach(id => document.getElementById(id).value = '');
    renderFraction(null, null, 'result-display');
    document.getElementById('steps-section').style.display = 'none';
    document.getElementById('error-msg').textContent = '';
  }

  // Quick reference
  const refs = [
    { q: '1/2 + 1/3', a: '5/6' },
    { q: '3/4 + 1/4', a: '1' },
    { q: '2/3 − 1/6', a: '1/2' },
    { q: '5/8 − 1/4', a: '3/8' },
    { q: '2/3 × 3/4', a: '1/2' },
    { q: '1/2 × 1/2', a: '1/4' },
    { q: '3/4 ÷ 3/8', a: '2' },
    { q: '2/5 ÷ 4/5', a: '1/2' },
    { q: 'Simplify 6/9', a: '2/3' },
    { q: 'Simplify 8/12', a: '2/3' },
    { q: '1/3 + 1/6', a: '1/2' },
    { q: '7/8 − 3/8', a: '1/2' },
  ];

  const grid = document.getElementById('ref-grid');
  refs.forEach(r => {
    const div = document.createElement('div');
    div.className = 'ref-card';
    div.innerHTML = `<div class="ref-q">${r.q}</div><div class="ref-a">= ${r.a}</div>`;
    grid.appendChild(div);
  });
</script>
</body>
</html>
